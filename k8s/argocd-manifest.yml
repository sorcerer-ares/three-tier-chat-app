apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: fullstack-chatapp
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/sorcerer-ares/three-tier-chat-app.git
    targetRevision: main
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: chatapp
  syncPolicy:
    automated:
      prune: true
      selfHeal: true